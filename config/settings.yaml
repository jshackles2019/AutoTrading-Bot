# Example settings for the Breakout Trading Bot

symbols:
  - AAPL
  - SPY
  - TSLA
  - AMZN
  - MSFT
  - GOOGL
  - NVDA
  - META
  - NFLX
  - AMD
  - INTC
  - SPCX
  - WMT
  - DIS
  - INTC
  - AMZN

timeframe: 5Min
lookback: 50
loop_interval_seconds: 60

strategy:
  lookback_support: 20
  lookback_resistance: 20
  volume_threshold_factor: 1.2
  atr_multiplier: 2.0
  target_multiplier: 2.0
  check_volatility: false

automation:
  preflight:
    enabled: true
    max_market_data_age_minutes: 20
    symbols_to_check: 3
  reconciliation:
    allow_dry_run_mismatch: true
  trading_window:
    enabled: true
    start: "09:30"
    end: "16:00"
    weekdays: [0, 1, 2, 3, 4]

risk:
  max_risk_pct: 0.01   # 1% of equity
  max_trades_per_day: 3
  max_open_risk_pct: 0.03
  max_position_pct: 0.05
  max_open_positions: 5
  symbol_cooldown_minutes: 30
  max_daily_drawdown_pct: 0.03
  max_consecutive_losses: 3
  min_shares: 1
  volume_threshold_factor: 1.5

scanner:
  top_candidates: 20
  min_price: null
  max_price: null
  min_average_volume: null
  volume_ratio_cap: 5.0
  score_weights:
    confidence: 50.0
    breakout: 200.0
    volume: 10.0
    momentum: 100.0
