# Example settings for the Breakout Trading Bot

symbols:
  - AAPL
  - SPY
  - TSLA
  - AMZN
  - MSFT
  - GOOGL
  - NVDA
  - META
  - NFLX
  - AMD
  - INTC
  - SPCX
  - WMT
  - DIS
  - INTC
  - AMZN

timeframe: 5Min
lookback: 50
loop_interval_seconds: 60

risk:
  max_risk_pct: 0.01   # 1% of equity
  max_trades_per_day: 3
  max_open_risk_pct: 0.03
  max_position_pct: 0.05
  min_shares: 1
  volume_threshold_factor: 1.5

scanner:
  top_candidates: 20
  min_price: null
  max_price: null
  min_average_volume: null
  volume_ratio_cap: 5.0
  score_weights:
    confidence: 50.0
    breakout: 200.0
    volume: 10.0
    momentum: 100.0
